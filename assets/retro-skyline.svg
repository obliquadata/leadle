<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 360" preserveAspectRatio="none">
  <defs>
    <linearGradient id="sunGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2e4be"/>
      <stop offset="100%" stop-color="#e6cb8b"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4e6c2"/>
      <stop offset="100%" stop-color="#e7d5a8"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6daba2"/>
      <stop offset="100%" stop-color="#3a7b78"/>
    </linearGradient>
    <linearGradient id="darkTealGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a6970"/>
      <stop offset="100%" stop-color="#1f4b56"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- soft horizon glow -->
  <ellipse cx="720" cy="332" rx="210" ry="20" fill="#d78343" opacity="0.22" filter="url(#softGlow)"/>

