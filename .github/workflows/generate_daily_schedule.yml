name: Generate daily schedule only

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate_daily_schedule:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Ensure required files exist
        run: |
          test -f scripts/generate-daily-schedule.mjs
          test -f data/leaders.json
          mkdir -p data

      - name: Run daily schedule generator
        run: node scripts/generate-daily-schedule.mjs

      - name: Show generated daily schedule
        run: |
          ls -la data
          wc -c data/daily-schedule.json
          head -n 20 data/daily-schedule.json

      - name: Commit updated daily schedule
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/daily-schedule.json
          git diff --cached --quiet && exit 0
          git commit -m "Regenerate daily schedule"
          git push
