name: Update leaders database

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Show repo structure
        run: |
          pwd
          ls -la
          ls -la scripts || true
          ls -la data || true

      - name: Resolve generator path
        run: |
          if [ -f scripts/update-leaders.mjs ]; then
            echo "GENERATOR_PATH=scripts/update-leaders.mjs" >> $GITHUB_ENV
          elif [ -f update-leaders.mjs ]; then
            echo "GENERATOR_PATH=update-leaders.mjs" >> $GITHUB_ENV
          else
            echo "Could not find update-leaders.mjs in scripts/ or repo root"
            exit 1
          fi

      - name: Create data directory if missing
        run: mkdir -p data

      - name: Run leader database generator
        run: node "$GENERATOR_PATH"

      - name: Run daily schedule generator
        run: node scripts/generate-daily-schedule.mjs

      - name: Show generated leaders file
        run: |
          ls -la data
          wc -c data/leaders.json
          head -n 20 data/leaders.json

      - name: Commit updated leaders database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/leaders.json data/daily-schedule.json
          git diff --cached --quiet && exit 0
          git commit -m "Update leaders database and daily schedule"
          git push
