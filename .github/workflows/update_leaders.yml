name: Review leader-name changes

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Show repo structure
        run: |
          pwd
          ls -la
          ls -la scripts || true
          ls -la data || true

      - name: Resolve generator path
        run: |
          if [ -f scripts/update-leaders.mjs ]; then
            echo "GENERATOR_PATH=scripts/update-leaders.mjs" >> $GITHUB_ENV
          elif [ -f update-leaders.mjs ]; then
            echo "GENERATOR_PATH=update-leaders.mjs" >> $GITHUB_ENV
          else
            echo "Could not find update-leaders.mjs in scripts/ or repo root"
            exit 1
          fi

      - name: Create data directory if missing
        run: mkdir -p data

      - name: Validate existing leaders database
        run: node -e "const fs=require('fs'); const p='data/leaders.json'; const data=JSON.parse(fs.readFileSync(p,'utf8')); if (!Array.isArray(data.leaders)) throw new Error('data/leaders.json does not contain a leaders array'); console.log('Existing leaders:', data.leaders.length);"

      - name: Generate leader-name change review
        run: node "$GENERATOR_PATH"

      - name: Show leader-name change review
        run: |
          ls -la data
          wc -c data/leader-change-review.json
          head -n 80 data/leader-change-review.json

      - name: Commit leader change review
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/leader-change-review.json data/missing-images.json
          git diff --cached --quiet && exit 0
          git commit -m "Review leader-name changes"
          git push
